name: PR

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, test, assemble
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # The wrapper jar is generated by the bootstrap step below on first run.
      # actions/setup-gradle@v3 installs Gradle so `gradle wrapper` works even when
      # the repo doesn't yet ship the wrapper binary.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10.2
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Bootstrap Gradle wrapper if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.10.2 --distribution-type bin
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: ktlint
        run: ./gradlew ktlintCheck --stacktrace

      - name: detekt
        run: ./gradlew detekt --stacktrace

      - name: Android Lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest :core:common:test --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Upload lint reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: |
            **/build/reports/
            **/build/test-results/
          retention-days: 14
          if-no-files-found: ignore
